services:
  app:
    image: rabbitmq:3-management
    command: /etc/rabbitmq/bootstrap.sh
    environment:
      - RABBITMQ_DEFAULT_USER=dtunnel
      - RABBITMQ_DEFAULT_PASS=DTunnel01
    ports:
      - 5672:5672
      - 15672:15672
    volumes:
      - ms_rabbitmq_data:/var/lib/rabbitmq
      - ms_rabbitmq_log:/var/log/rabbitmq
      - ./bootstrap.sh:/etc/rabbitmq/bootstrap.sh:ro
      - ./rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
      - ./definitions.json:/etc/rabbitmq/definitions.json:ro
    networks:
      - network
    deploy:
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: any
      resources:
        limits:
          cpus: '0.45'
          memory: 512M

networks:
  network:
    name: 'rabbitmq_net'
    driver: 'overlay'
    attachable: true

volumes:
  ms_rabbitmq_data:
    name: 'ms_rabbitmq_data'
  ms_rabbitmq_log:
    name: 'ms_rabbitmq_log'
